{% extends "layout.html" %}
{% block body %}
<div class="instrument">
    <h1>{{ result[2] }} / {{ result[3] }}</h1>
    <div class="instrument-layout">
        <div class="instrument-image">
            <img src="{{ result[5] }}" alt="{{ result[2] }} {{ result[3] }}">
        </div>
        <div class="instrument-details">
            <h2>Instrument: {{ result[1] }}</h2>
            <h2>Brand: {{ result[2] }}</h2>
            <h2>Model: {{ result[3] }}</h2>
            <h2>Country of origin: {{ result[7] }}</h2>
            <h2>Price: ${{ result[4] }}</h2>
            <h3>Description:</h3>
            <p>{{ result[6] }}</p>
        </div>
    </div>
</div>
{% endblock %}
